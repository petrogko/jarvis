[tool.pytest.ini_options]
# Default test discovery: tests/ directory, hermetic unit tests only.
# The three integration tests (test_browser_integration, test_classifier,
# test_e2e_pipeline) hit external APIs and are excluded from default
# collection; run them explicitly with:
#     pytest tests/test_classifier.py
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = [
    "--strict-markers",
    "--ignore=tests/test_browser_integration.py",
    "--ignore=tests/test_classifier.py",
    "--ignore=tests/test_e2e_pipeline.py",
]
markers = [
    "integration: hits external APIs; run manually, skipped by default CI",
]
asyncio_mode = "auto"
